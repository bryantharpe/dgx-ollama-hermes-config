<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" id="expo-map">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1"/>
    </pattern>
    <pattern id="tiles" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#0f172a"/>
      <rect width="10" height="10" fill="#1e293b"/>
      <rect x="10" y="10" width="10" height="10" fill="#1e293b"/>
    </pattern>
  </defs>
  
  <rect width="800" height="600" fill="#0f172a"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <g id="aisles">
    <path d="M 100 50 L 100 550" stroke="#334155" stroke-width="2"/>
    <path d="M 220 50 L 220 550" stroke="#334155" stroke-width="2"/>
    <path d="M 340 50 L 340 550" stroke="#334155" stroke-width="2"/>
    <path d="M 460 50 L 460 550" stroke="#334155" stroke-width="2"/>
    <path d="M 580 50 L 580 550" stroke="#334155" stroke-width="2"/>
    <path d="M 700 50 L 700 550" stroke="#334155" stroke-width="2"/>
    <path d="M 100 130 L 700 130" stroke="#334155" stroke-width="2"/>
    <path d="M 100 230 L 700 230" stroke="#334155" stroke-width="2"/>
    <path d="M 100 330 L 700 330" stroke="#334155" stroke-width="2"/>
    <path d="M 100 430 L 700 430" stroke="#334155" stroke-width="2"/>
    <path d="M 100 530 L 700 530" stroke="#334155" stroke-width="2"/>
  </g>
  
  <g id="booths">
    <rect x="120" y="70" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="165" y="100" font-size="10" fill="#f8fafc" text-anchor="middle">B01</text>
    
    <rect x="240" y="70" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="285" y="100" font-size="10" fill="#f8fafc" text-anchor="middle">B02</text>
    
    <rect x="360" y="70" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="405" y="100" font-size="10" fill="#f8fafc" text-anchor="middle">B03</text>
    
    <rect x="480" y="70" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="525" y="100" font-size="10" fill="#f8fafc" text-anchor="middle">B04</text>
    
    <rect x="600" y="70" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="645" y="100" font-size="10" fill="#f8fafc" text-anchor="middle">B05</text>
    
    <rect x="240" y="170" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="285" y="200" font-size="10" fill="#f8fafc" text-anchor="middle">B06</text>
    
    <rect x="480" y="170" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="525" y="200" font-size="10" fill="#f8fafc" text-anchor="middle">B07</text>
    
    <rect x="240" y="270" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="285" y="300" font-size="10" fill="#f8fafc" text-anchor="middle">B08</text>
    
    <rect x="480" y="270" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="525" y="300" font-size="10" fill="#f8fafc" text-anchor="middle">B09</text>
    
    <rect x="120" y="370" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="165" y="400" font-size="10" fill="#f8fafc" text-anchor="middle">B10</text>
    
    <rect x="360" y="370" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="405" y="400" font-size="10" fill="#f8fafc" text-anchor="middle">B11</text>
    
    <rect x="600" y="370" width="90" height="50" fill="#1e293b" stroke="#6366f1" stroke-width="1" rx="4"/>
    <text x="645" y="400" font-size="10" fill="#f8fafc" text-anchor="middle">B12</text>
  </g>
  
  <g id="entrance">
    <rect x="400" y="20" width="40" height="20" fill="#10b981" rx="2"/>
    <text x="420" y="35" font-size="10" fill="#0f172a" text-anchor="middle">ENTRANCE</text>
  </g>
  
  <g id="info">
    <rect x="650" y="530" width="120" height="40" fill="#1e293b" stroke="#6366f1" stroke-width="2" rx="8"/>
    <text x="710" y="545" font-size="12" fill="#6366f1" text-anchor="middle" font-weight="bold">AI WORLD FAIR</text>
    <text x="710" y="560" font-size="10" fill="#f8fafc" text-anchor="middle">Exhibition Map</text>
  </g>
</svg>
