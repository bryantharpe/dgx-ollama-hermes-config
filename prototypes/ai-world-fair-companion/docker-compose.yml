name: "ai-world-fair-companion"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-world-fair-companion
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
