<!DOCTYPE html>
<!-- AI World Fair Companion - Command Palette Version -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI World Fair Companion</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <nav class="sidebar">
            <div class="sidebar-header">AWF Companion</div>
            <div class="sidebar-nav">
                <a href="#/" class="active">Search</a>
                <a href="#/schedule">Schedule</a>
                <a href="#/expo">Expo Map</a>
                <a href="#/badge">My Badge</a>
                <a href="#/contacts">Contacts</a>
            </div>
        </nav>

        <div id="main-content" style="margin-left: 200px; padding: 2rem;">
            <div id="view-container"></div>
        </div>

        <!-- Command Palette Overlay -->
        <div id="cmd-palette" class="cmd-palette hidden">
            <div class="cmd-palette-tabs">
                <button class="cmd-palette-tab active" data-tab="talks">Talks</button>
                <button class="cmd-palette-tab" data-tab="speakers">Speakers</button>
                <button class="cmd-palette-tab" data-tab="booths">Booths</button>
            </div>
            <input type="text" id="cmd-palette-input" class="cmd-palette-input" placeholder="Search talks, speakers, or booths..." autocomplete="off">
            <div id="cmd-palette-results" class="cmd-palette-results"></div>
            <div class="cmd-palette-no-results hidden">No results found. Try a different search term.</div>
            <div class="cmd-palette-hint" style="text-align: center; color: #8b949e; font-size: 0.9rem; margin-top: 1rem; margin-bottom: 1rem;">
                Use <kbd>↑</kbd> <kbd>↓</kbd> to navigate, <kbd>Enter</kbd> to select, <kbd>Esc</kbd> to close
            </div>
        </div>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Title</h2>
                    <button class="modal-close" id="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
    </div>

    <!-- QR Code library (vendored) -->
    <script src="/static/qrcode.min.js"></script>

    <!-- Application Scripts -->
    <script src="/static/app.js"></script>
    <script src="/static/palette.js"></script>
    <script src="/static/search.js"></script>
</body>
</html>
