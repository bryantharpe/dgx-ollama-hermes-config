  # ── Migration target: parallel SGLang serving the same model ───────────────
  # Background in vllm-to-sglang-migration-plan.md. SGLang on a NEWER stack
  # (CUDA 13.2 / PyTorch 2.11 / FlashInfer 0.6.7 / Transformers 5.5.3) than
  # the stalled scitrera vLLM image (CUDA 13.1 / FlashInfer 0.6.2). Serves on
  # host port 8002 alongside vLLM on 8001 — vLLM keeps serving openclaw the
  # whole time. Flip openclaw / hermes-agent / opencode internal URLs only
  # after `eval/runner.py --tier=full --judge=opus46` shows parity AND
  # sglang completes a full run without engine crash.
  #
  # MTP / spec-decode is intentionally OFF in the initial bring-up — get the
  # model loading and a clean smoke completion first, then add
  # `--speculative-algorithm EAGLE` etc. once we know the base path is
  # working. (vLLM's `cudaErrorIllegalAddress` lives in the MTP path; isolate
  # before re-introducing.)
  #
  # Port collision note: vllm-test-* (profile=test) also bind 8002. Don't
  # `--profile test up` while sglang is running.
  sglang:
    image: scitrera/dgx-spark-sglang:0.5.10
    container_name: sglang
    ports:
      # Host 8002 → container 30000 (sglang's default OpenAI-compatible port).
      # Bound to 0.0.0.0 so the eval harness can reach it from a host shell;
      # LAN exposure is the same trust model as vLLM (no auth).
      - "0.0.0.0:8002:30000"
    volumes:
      # Share vLLM's HF cache so we don't re-download 14 GB of Intel
      # AutoRound weights. Read-write (not :ro) because sglang may want to
      # write tokenizer/auxiliary metadata; concurrent reads with vLLM are
      # safe (HF cache is content-addressed).
      - vllm_hf_cache:/root/.cache/huggingface
      # Separate compile cache — sglang's torch.compile artefacts are not
      # interchangeable with vLLM's.
      - sglang_compile_cache:/root/.cache/sglang
      # Reuse the same chat template that flips enable_thinking default-OFF.
      # Mount path differs (/etc/sglang vs /etc/vllm) so the two services
      # have distinct in-container paths and can't accidentally share state.
      - ./vllm-templates/qwen3.6-27b.jinja:/etc/sglang/qwen3.6-27b.jinja:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Required when speculative decoding (EAGLE) is on for Qwen3.6
      # hybrid-attention models AND we want radix cache. Without it,
      # sglang errors at startup. See --mamba-scheduler-strategy below.
      - SGLANG_ENABLE_SPEC_V2=1
    ipc: host
    command:
      - python3
      - -m
      - sglang.launch_server
      # Model: sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP
      # — same abliterated personality as the compressed-tensors variant
      # we tested previously, but quantised via NVIDIA ModelOpt 0.43.0
      # (NVFP4_DEFAULT_CFG) and ships an MTP draft head (~850 MB bf16, 15
      # mtp.* tensors). The draft head enables speculative decoding via
      # the EAGLE algorithm in sglang, expected to ~2x decode rate over
      # the no-MTP variant (sakamakismile reports per-position acceptance
      # 87/72/61% on rtx pro 6000).
      #
      # To A/B vs the no-MTP abliterated:
      #   sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP
      # → sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4
      # AND change --quantization back to compressed-tensors AND remove the
      # --speculative-* flags below.
      - --model-path=sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP
      # ModelOpt's NVFP4 output uses NVIDIA's own quant_config layout
      # (different from compressed-tensors). sglang has a dedicated loader
      # via this choice (per QUANTIZATION_CHOICES in server_args.py).
      - --quantization=modelopt
      - --host=0.0.0.0
      - --port=30000
      # 262144 = native context for Qwen3.6 family, same as vLLM.
      - --context-length=262144
      # 0.75 of unified memory budget. Same envelope as vLLM's
      # gpu-memory-utilization. Sglang separates this into mem-fraction-static
      # (model + activations) — we'll watch KV cache headroom in /metrics.
      - --mem-fraction-static=0.75
      # Start with `auto` rather than fp8_e5m2/e4m3 to let sglang pick the
      # variant Intel's AutoRound runtime expects. Tighten later if memory
      # pressure shows up.
      - --kv-cache-dtype=auto
      # Force non-cuDNN GEMM kernels — the scitrera image has cuDNN libs
      # but is missing the `nvidia-cudnn-frontend` Python package, which
      # the auto/flashinfer_cudnn paths require. CUTLASS is well-tested on
      # SM_120 Blackwell and avoids that dependency entirely. Both flags
      # are needed because the model has NVFP4 weights AND FP8 KV cache /
      # intermediates. If we end up sticking with sglang, the proper fix
      # is to bake `pip install nvidia-cudnn-frontend` into a custom layer
      # on top of this image; for now, sidestepping is cheaper.
      - --fp4-gemm-backend=cutlass
      - --fp8-gemm-backend=cutlass
      - --chunked-prefill-size=16384
      - --max-prefill-tokens=16384
      - --max-running-requests=4
      # Same parser names as vLLM — sglang adopted them.
      - --reasoning-parser=qwen3
      - --tool-call-parser=qwen3_coder
      - --chat-template=/etc/sglang/qwen3.6-27b.jinja
      # Served-model-name encodes both quant and engine for A/B clarity.
      # Each variant lands in its own results/<model>/ directory.
      # Note: sglang reserves `:` for LoRA model:adapter syntax (rejects
      # colons in --served-model-name) — use dashes throughout.
      - --served-model-name=qwen3.6-27b-abl-nvfp4-mtp-sg
      # MTP speculative decoding TEMPORARILY DISABLED for diagnostic — the
      # MTP variant of this model fails to LOAD on sglang (weight shape
      # assertion in linear.py:713) regardless of spec-decode flags.
      # Confirming whether the failure is model-loading or spec-decode
      # interaction by trying without spec flags first.
      # - --speculative-algorithm=EAGLE
      # - --speculative-num-steps=2
      # - --speculative-num-draft-tokens=4
      # - --speculative-eagle-topk=1
      # - --mamba-scheduler-strategy=extra_buffer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # Sglang's /health endpoint follows OpenAI-compatible convention.
      # Same python3 probe shape as vLLM (the scitrera image ships python3).
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:30000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot reuses HF cache (no re-download) but compiles CUDA graphs
      # on the newer torch.compile stack — allow 15 min.
      start_period: 900s
    # Manual lifecycle during validation — don't auto-restart on crash so
    # crashes are visible to the operator. Flip to `always` at cutover.
    restart: "no"

  # ── Ollama: dual role ─────────────────────────────────────────────────────
  # 1) Migration candidate #2 vs sglang (legacy purpose; vllm-to-sglang-
  #    migration-plan.md). Quality regressions on sglang made ollama the more
  #    conservative chat-engine alternative for benchmarking.
  # 2) Embedding host for OpenClaw's `memorySearch` feature (2026-05-04+).
  #    `nomic-embed-text` (~274 MB; 768-dim) serves /v1/embeddings; the gateway
  #    reaches it over the bridge as http://ollama:11434/v1. memorySearch
  #    indexes ~/.openclaw/workspace/memory/*.md so Captain Nemo can do
  #    in-conversation recall over past journals.
  # Promoted from manual-lifecycle (`restart: "no"`) to `restart: always`
  # for the embeddings role. Memory cost is small (~600 MB VRAM resident);
  # the 27B chat model would still need vllm stopped first if loaded here
  # for A/B benchmarking.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      # 11434 = ollama default. Bound to 0.0.0.0 so eval harness on host
      # AND any LAN client can hit /v1/* (no auth, same trust model as vLLM).
      - "0.0.0.0:11434:11434"
    volumes:
      # Reuse the orphaned ollama_data volume from before the vLLM cutover.
      # Cached GGUFs there (qwen3.5/3.6 era) save re-download time if any
      # match; new pulls add to the same store.
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # Keep models loaded across requests (ollama defaults to ~5min unload).
      # Eval harness sends bursts of requests with idle gaps between probes.
      - OLLAMA_KEEP_ALIVE=24h
      # 2026-05-04 — q8_0 KV cache halves memory vs default f16 at negligible
      # quality loss, letting Q5_K_M @ 262144 ctx fit fully on GPU instead
      # of spilling 23 layers to CPU. FLASH_ATTENTION=1 is required for any
      # non-f16 KV cache type; it's defaulted on in 0.21.2 but make it
      # explicit so a future ollama upgrade doesn't silently break this.
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_FLASH_ATTENTION=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # 2026-05-04 — switched from `deploy.resources.reservations.devices`
    # (legacy nvidia-container-runtime path) to CDI direct injection.
    # The legacy path doesn't run the CDI hook that creates the symlinks
    # NVML needs to initialize on this Spark + nvidia-ctk 1.19.0 + cgroup v2
    # + systemd-cgroup-driver combo, leading to "Failed to initialize NVML:
    # Unknown Error" inside the container even though /dev/nvidia* nodes
    # ARE mounted. CDI injection (`nvidia.com/gpu=all`) routes through the
    # CDI spec at /etc/cdi/nvidia.yaml and runs `nvidia-cdi-hook
    # create-symlinks` at container creation. Verified on this host: ad-hoc
    # `docker run --device=nvidia.com/gpu=all nvidia/cuda:13.0.0-base
    # nvidia-smi` returns the GB10 cleanly. vLLM stays on the legacy path
    # because its scitrera image bundles enough lib paths to work without
    # the CDI hook — leaving its `deploy:` block alone keeps that working.
    devices:
      - "nvidia.com/gpu=all"
    healthcheck:
      # Ollama exposes /api/tags as a no-op list endpoint; ~ 1ms response.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # `always` since 2026-05-04 — OpenClaw memorySearch depends on this.
    restart: always

  hermes-agent:
    build: ./hermes-agent
    image: hermes-agent:latest
    container_name: hermes-agent
    ports:
      - "127.0.0.1:8642:8642"
    volumes:
      - ~/.hermes:/opt/data
      - ./hermes-agent/skills:/opt/hermes/skills
      - ./prototype-specs:/home/admin/code/hermes-config/prototype-specs
      - ./prototypes:/home/admin/code/hermes-config/prototypes
    extra_hosts:
      - "ha.internal:192.168.10.151"
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_API_KEY}
      - API_SERVER_HOST=0.0.0.0
      - HERMES_INFERENCE_PROVIDER=custom
      - OPENAI_API_BASE_URL=http://ollama:11434/v1
      - OPENAI_API_KEY=none
      - LLM_MODEL=qwen3.6-27b:128k
      - OPENCODE_URL=http://opencode:4096
      - OPENCODE_USERNAME=opencode
      - OPENCODE_PASSWORD=${OPENCODE_PASSWORD}
      - HERMES_PROTOTYPES_DIR=/home/admin/code/hermes-config/prototypes
      - GATEWAY_ALLOW_ALL_USERS=true
      - HASS_URL=${HOME_ASSISTANT_URL}
      - HASS_TOKEN=${HOME_ASSISTANT_TOKEN}
      - HERMES_AGENT_TIMEOUT=600
      - HERMES_STREAM_READ_TIMEOUT=600
      - HOME_ASSISTANT_URL=${HOME_ASSISTANT_URL}
      - HOME_ASSISTANT_TOKEN=${HOME_ASSISTANT_TOKEN}
      - SEEDER_URL=http://prototype-seeder:8080
    command: gateway
    cap_drop:
      - DAC_OVERRIDE
    depends_on:
      # 2026-05-04 — was `vllm: service_healthy`. Flipped to ollama as
      # part of the revert. vLLM stays in compose for the 7-day soak
      # rollback path but isn't a startup dep anymore.
      ollama:
        condition: service_healthy
      prototype-seeder:
        condition: service_started
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui_data:/app/backend/data
    environment:
      # Multi-URL form: hermes-agent for orchestrated chats + raw ollama
      # for bare-model access. Both speak OpenAI-compat /v1.
      # 2026-05-04 — flipped second URL from vllm:8000 to ollama:11434
      # as part of the vLLM → Ollama revert.
      - OPENAI_API_BASE_URLS=http://hermes-agent:8642/v1;http://ollama:11434/v1
      - OPENAI_API_KEYS=${HERMES_API_KEY};none
      - HTTPX_TIMEOUT=600
    depends_on:
      hermes-agent:
        condition: service_started
      # 2026-05-04 — flipped from vllm to ollama as part of the revert.
      ollama:
        condition: service_healthy
    restart: always

  vault:
    image: hashicorp/vault
    container_name: vault
    ports:
      - "127.0.0.1:8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
    networks:
      - default
    restart: always

  opencode:
    build: ./opencode
    image: opencode:latest
    container_name: opencode
    ports:
      - "127.0.0.1:4096:4096"
    volumes:
      - ./prototype-specs:/specs:ro
      - ./prototypes:/prototypes
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_PASSWORD}
      - OPENCODE_SERVER_USERNAME=opencode
      - SEEDER_URL=http://prototype-seeder:8080
    cap_drop:
      - DAC_OVERRIDE
    depends_on:
      # 2026-05-04 — flipped from vllm to ollama as part of the revert.
      ollama:
        condition: service_healthy
      prototype-seeder:
        condition: service_started
    restart: always

  prototype-seeder:
    build: ./prototype-seeder
    image: prototype-seeder:latest
    container_name: prototype-seeder
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./prototypes:/prototypes
    restart: always

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    hostname: hermes-dgx
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DOCKER_HOST=/var/run/docker.sock
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    restart: always

volumes:
  # Kept (orphaned) for one-week rollback window after vLLM cutover 2026-04-25.
  # Contains ~tens of GB of pulled Ollama models. `docker volume rm ollama_data`
  # to reclaim once vLLM is proven stable.
  ollama_data:
  vllm_hf_cache:
  vllm_compile_cache:
  vllm_test_compile_cache:
  sglang_compile_cache:
  hermes_data:
  open-webui_data:
  netdata_config:
  netdata_lib:
  netdata_cache:
