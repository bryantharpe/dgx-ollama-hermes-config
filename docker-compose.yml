services:
  vllm:
    # scitrera build is pre-compiled for DGX Spark (ARM64 + CUDA 13.1 + SM_120
    # Blackwell + FlashInfer 0.6.2). vanilla vllm/vllm-openai is x86_64 only.
    # `-t5` = Transformers 5.0+. Required by the Qwen3.6 family architectures
    # (`qwen3_5` for the dense 27B served here; `qwen3_5_moe` for the older
    # 35B-A3B that this slot used to serve), both of which landed in
    # Transformers main on 2026-02-09. Use 0.17.0+ (March 2026) — earlier
    # 0.14.1-t5 (Jan 2026) and the `-t4` builds (Transformers 4.57.x) raise
    # pydantic ValidationError "Transformers does not recognize this
    # architecture" at engine startup.
    image: scitrera/dgx-spark-vllm:0.17.0-t5
    container_name: vllm
    ports:
      # Host port 8001 because 8000 is held by an unrelated prototype
      # (ai-world-fair-companion). Internal port stays 8000 so all
      # inter-container URLs (http://vllm:8000/v1) remain valid.
      # Bound to 0.0.0.0 (not 127.0.0.1) so the LAN can reach the API
      # at http://192.168.10.80:8001/v1/* — vLLM has no auth, so this
      # implicitly trusts the LAN. If that's ever not OK, switch back
      # to 127.0.0.1 and front it with the openclaw Caddy.
      - "0.0.0.0:8001:8000"
    volumes:
      - vllm_hf_cache:/root/.cache/huggingface
      - vllm_compile_cache:/root/.cache/vllm
      # Local edit of Qwen3.6's chat template that flips enable_thinking
      # from default-on to default-off. Without this, the 27B reasons
      # indefinitely on small/orchestration tasks and openclaw — which has
      # no plumbing to inject `chat_template_kwargs` per request — wedges.
      # Callers that genuinely want reasoning (e.g. the build coder)
      # should send `chat_template_kwargs.enable_thinking=true`.
      - ./vllm-templates/qwen3.6-27b.jinja:/etc/vllm/qwen3.6-27b.jinja:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
      # HF_HUB_ENABLE_HF_TRANSFER would speed downloads but the scitrera
      # image does not bundle the `hf_transfer` package and downloads crash
      # when it's enabled. Standard urllib3 download is fine for one-shot.
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_USE_V1=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # Shared memory for inter-process model loading; required by vLLM under
    # docker (default 64MB shm is not enough).
    ipc: host
    command:
      - vllm
      - serve
      - Qwen/Qwen3.6-27B-FP8
      # 2026-04-27 perf survey:
      # - Qwen3.6-27B-FP8 dense (this): ~7.4 t/s decode, CLEAN output
      #   (chat template's enable_thinking=false works as intended).
      # - Qwen3.6-35B-A3B-FP8 (MoE): ~17-25 t/s without prefill but the
      #   model emits verbose thinking-prose by default; only useful with
      #   assistant-turn prefill, which openclaw doesn't currently inject.
      # - cyankiwi/Qwen3.6-27B-AWQ-INT4: ~12 t/s but the quant has
      #   prose-heavy default style that flags can't suppress.
      # - Ollama Qwen3 (3.0) :30B Q4_K_M: ~72 t/s and tool calling works,
      #   but Qwen3.6 (qwen35 arch) is not yet supported in Ollama as of
      #   0.21.2 (2026-04-23). Re-evaluate when Ollama ships qwen35.
      # Net: dense 27B FP8 stays the canonical model — slow, but clean
      # output and full tool-calling fidelity through the qwen3_coder
      # parser. Build-agent timeouts already raised to 1800s to accommodate.
      - --host=0.0.0.0
      - --port=8000
      # 262144 = native context for Qwen3.6-27B. Larger KV cache reservation
      # at startup (vs. the prior 131072), but the 27B dense weights are
      # ~28GB FP8 (vs ~35GB for the prior 35B-A3B MoE), so the GB10's 128GB
      # unified memory has room. If startup OOMs or KV cache budget warns
      # too low, fall back to 196608 or 131072.
      #
      # Tested 2026-04-27: dropping to 65536 + bumping gpu-memory-utilization
      # to 0.90 + adding --kv-cache-dtype=fp8 gave ZERO speedup (still 7.4 t/s
      # decode, same as the 9.7 t/s theoretical peak from 273 GB/s ÷ 28 GB
      # weights — we're memory-bandwidth-bound). FP8 KV cache also emitted
      # accuracy warnings because the Qwen3.6-27B-FP8 checkpoint doesn't ship
      # q/k/v calibration scales. Reverted to the original values.
      - --max-model-len=262144
      - --gpu-memory-utilization=0.75
      - --reasoning-parser=qwen3
      # Local default-off-thinking template; see volume comment above.
      - --chat-template=/etc/vllm/qwen3.6-27b.jinja
      - --enable-auto-tool-choice
      # qwen3_coder is the correct parser per Qwen's HF model card; the
      # `hermes` parser returns 400 on tool_choice=auto for this family
      # (see NVIDIA forum thread 362784).
      - --tool-call-parser=qwen3_coder
      # Multi-alias so existing client configs (LLM_MODEL, opencode.json,
      # openclaw.json) resolve to this backend without rename churn during
      # the 35B-A3B → 27B cutover. New code should prefer the truthful
      # `qwen3.6-27b:*` / `hermes-orchestrator:qwen3.6-27b-*` names; the
      # legacy `qwen3.6-35b*` aliases are retained ONLY for compatibility
      # and now resolve to the dense 27B model — they are misnomers and
      # should be migrated off over time.
      # NOTE: must use space-separated form (no `=`) so argparse nargs='+'
      # consumes all the names; `--served-model-name=foo bar baz` only
      # binds the first.
      - --served-model-name
      - qwen3.6-27b:262k
      - qwen3.6-27b:128k
      - qwen3.6:27b-fp8
      - hermes-orchestrator:qwen3.6-27b-262k
      - hermes-orchestrator:qwen3.6-27b-128k
      - qwen3.6-35b:128k
      - qwen3.6:35b-a3b-q8_0
      - qwen3.6-35b-a3b:q6-65k
      - hermes-orchestrator:qwen3.6-128k
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # The scitrera image doesn't ship curl/wget; use python3 (always present
      # in the vLLM container) for the /health probe.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot downloads ~28GB (Qwen3.6-27B-FP8) and compiles CUDA
      # graphs; allow 15min. Subsequent boots reuse vllm_hf_cache and
      # vllm_compile_cache so they're much faster (~60–90s).
      start_period: 900s
    restart: always

  hermes-agent:
    build: ./hermes-agent
    image: hermes-agent:latest
    container_name: hermes-agent
    ports:
      - "127.0.0.1:8642:8642"
    volumes:
      - ~/.hermes:/opt/data
      - ./hermes-agent/skills:/opt/hermes/skills
      - ./prototype-specs:/home/admin/code/hermes-config/prototype-specs
      - ./prototypes:/home/admin/code/hermes-config/prototypes
    extra_hosts:
      - "ha.internal:192.168.10.151"
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_API_KEY}
      - API_SERVER_HOST=0.0.0.0
      - HERMES_INFERENCE_PROVIDER=custom
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - OPENAI_API_KEY=none
      - LLM_MODEL=qwen3.6-35b:128k
      - OPENCODE_URL=http://opencode:4096
      - OPENCODE_USERNAME=opencode
      - OPENCODE_PASSWORD=${OPENCODE_PASSWORD}
      - HERMES_PROTOTYPES_DIR=/home/admin/code/hermes-config/prototypes
      - GATEWAY_ALLOW_ALL_USERS=true
      - HASS_URL=${HOME_ASSISTANT_URL}
      - HASS_TOKEN=${HOME_ASSISTANT_TOKEN}
      - HERMES_AGENT_TIMEOUT=600
      - HERMES_STREAM_READ_TIMEOUT=600
      - HOME_ASSISTANT_URL=${HOME_ASSISTANT_URL}
      - HOME_ASSISTANT_TOKEN=${HOME_ASSISTANT_TOKEN}
      - SEEDER_URL=http://prototype-seeder:8080
    command: gateway
    cap_drop:
      - DAC_OVERRIDE
    depends_on:
      vllm:
        condition: service_healthy
      prototype-seeder:
        condition: service_started
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui_data:/app/backend/data
    environment:
      # Multi-URL form: hermes-agent for orchestrated chats + raw vllm for
      # bare-model access. Both speak OpenAI-compat /v1; OLLAMA_BASE_URL was
      # dropped because vLLM does not implement Ollama-native /api/*.
      - OPENAI_API_BASE_URLS=http://hermes-agent:8642/v1;http://vllm:8000/v1
      - OPENAI_API_KEYS=${HERMES_API_KEY};none
      - HTTPX_TIMEOUT=600
    depends_on:
      hermes-agent:
        condition: service_started
      vllm:
        condition: service_healthy
    restart: always

  vault:
    image: hashicorp/vault
    container_name: vault
    ports:
      - "127.0.0.1:8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
    networks:
      - default
    restart: always

  opencode:
    build: ./opencode
    image: opencode:latest
    container_name: opencode
    ports:
      - "127.0.0.1:4096:4096"
    volumes:
      - ./prototype-specs:/specs:ro
      - ./prototypes:/prototypes
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_PASSWORD}
      - OPENCODE_SERVER_USERNAME=opencode
      - SEEDER_URL=http://prototype-seeder:8080
    cap_drop:
      - DAC_OVERRIDE
    depends_on:
      vllm:
        condition: service_healthy
      prototype-seeder:
        condition: service_started
    restart: always

  prototype-seeder:
    build: ./prototype-seeder
    image: prototype-seeder:latest
    container_name: prototype-seeder
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./prototypes:/prototypes
    restart: always

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    hostname: hermes-dgx
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DOCKER_HOST=/var/run/docker.sock
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    restart: always

volumes:
  # Kept (orphaned) for one-week rollback window after vLLM cutover 2026-04-25.
  # Contains ~tens of GB of pulled Ollama models. `docker volume rm ollama_data`
  # to reclaim once vLLM is proven stable.
  ollama_data:
  vllm_hf_cache:
  vllm_compile_cache:
  hermes_data:
  open-webui_data:
  netdata_config:
  netdata_lib:
  netdata_cache:
