services:
  openclaw-caddy:
    image: caddy:2-alpine
    container_name: openclaw-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:443:443"
      - "0.0.0.0:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
    depends_on:
      - openclaw-gateway

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    # Add node user (UID 1000 inside container) to host docker group so the
    # prototype-builder agent's pi session can use docker via the bind-mounted
    # socket. GID 988 matches host /etc/group (verified `getent group docker`).
    group_add:
      - "988"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCODE_URL: ${OPENCODE_URL:-http://opencode:4096}
      OPENCODE_USERNAME: ${OPENCODE_USERNAME:-opencode}
      OPENCODE_PASSWORD: ${OPENCODE_PASSWORD:-}
      SEEDER_URL: ${SEEDER_URL:-http://prototype-seeder:8080}
      PROTOTYPES_DIR: ${PROTOTYPES_DIR:-/home/node/prototypes}
      HINDSIGHT_API_URL: ${HINDSIGHT_API_URL:-}
      HINDSIGHT_API_TENANT_API_KEY: ${HINDSIGHT_API_TENANT_API_KEY:-}
      HINDSIGHT_BANK_ID: ${HINDSIGHT_BANK_ID:-bryan-default}
      # mcporter — npm-installed under /home/node/.npm-global so UID 1000
      # owns it (no root needed). PATH override puts the bundled openclaw
      # `mcporter` skill on PATH so the skill loader's `bins: [mcporter]`
      # check passes. NPM_CONFIG_PREFIX makes future `npm install -g` writes
      # land in the persistent volume too.
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATH: /home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - /home/admin/code/hermes-config/prototypes:/home/node/prototypes
      # Custom plugin: openclaw-prototypes (source-of-truth lives in the repo so
      # it's versioned alongside the rest of the stack; mounted into the
      # gateway's plugin discovery path).
      - /home/admin/code/hermes-config/openclaw-prototypes:/home/node/.openclaw/plugins/openclaw-prototypes
      # Workspace for the prototype-builder agent (IDENTITY.md + AGENTS.md
      # = the build-agent's lifted system prompt). Repo-tracked so it's
      # versioned and reproducible.
      - /home/admin/code/hermes-config/openclaw-prototypes/builder-workspace:/home/node/.openclaw/workspaces/prototype-builder
      # Docker socket + CLI binaries — gives the prototype-builder agent the
      # ability to run `docker compose up` for prototype containers. Tool
      # policy gates which agent can call exec/bash to actually use them
      # (only prototype-builder; Captain Nemo is denied group:runtime).
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose:ro
      # mcporter persistence — npm globals + mcporter config (which holds
      # the Hindsight bearer token in a server entry) survive container
      # recreations. Re-installing mcporter or re-adding the hindsight
      # entry is one command in the entrypoint hot-path docs if these
      # volumes are wiped.
      - openclaw_npm_global:/home/node/.npm-global
      - openclaw_mcporter:/home/node/.mcporter
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      # Published here (not on openclaw-dashboard) because the dashboard
      # shares this service's network namespace so its hardcoded
      # http://127.0.0.1:18789 gateway probe resolves to the gateway.
      - "0.0.0.0:9000:8080"
    init: true
    restart: unless-stopped
    networks:
      - default
      - hermes
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCODE_URL: ${OPENCODE_URL:-http://opencode:4096}
      OPENCODE_USERNAME: ${OPENCODE_USERNAME:-opencode}
      OPENCODE_PASSWORD: ${OPENCODE_PASSWORD:-}
      SEEDER_URL: ${SEEDER_URL:-http://prototype-seeder:8080}
      PROTOTYPES_DIR: ${PROTOTYPES_DIR:-/home/node/prototypes}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - /home/admin/code/hermes-config/prototypes:/home/node/prototypes
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  # socat sidecar in the gateway's netns. Forwards 127.0.0.1:18791 →
  # vllm:8000 so mudrii's dashboard (which hardcodes 127.0.0.1:<gatewayPort>
  # for chat) can reach vLLM's OpenAI-compat /v1/chat/completions. The
  # OpenClaw gateway itself does not serve chat over HTTP. Sidecar name
  # kept as "ollama-proxy" for stability across the 2026-04-25 vLLM
  # migration — the symbol stays even though the target moved.
  openclaw-ollama-proxy:
    image: alpine/socat
    container_name: openclaw-ollama-proxy
    network_mode: "service:openclaw-gateway"
    restart: unless-stopped
    command: ["TCP-LISTEN:18791,fork,reuseaddr", "TCP:vllm:8000"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  # Mobile-friendly dashboard (github.com/mudrii/openclaw-dashboard).
  # Exposed on 0.0.0.0:9000 → LAN reachable at http://192.168.10.80:9000.
  # Shares openclaw-gateway's network namespace (same pattern as openclaw-cli)
  # because the dashboard hardcodes http://127.0.0.1:18789 for gateway probes.
  # Consequence: port publishing for 9000:8080 lives on openclaw-gateway above.
  # Note: upstream image runs as UID 1001. Host's /home/admin/.openclaw is
  # mode 700 owned by UID 1000, so mounting it would give the container no
  # readable content. Dashboard runs standalone; openclaw-data panels will be
  # empty until we bridge the UID gap (future work). AI chat is routed through
  # openclaw-ollama-proxy (port 18791) → ollama:11434 since the gateway itself
  # has no /v1/chat/completions endpoint.
  openclaw-dashboard:
    build:
      context: ./dashboard
    container_name: openclaw-dashboard
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    environment:
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./dashboard-config/config.json:/app/config.json:ro
    depends_on:
      openclaw-ollama-proxy:
        condition: service_started
      openclaw-gateway:
        condition: service_healthy

networks:
  default:
    name: openclaw_default
  hermes:
    external: true
    name: hermes-config_default

volumes:
  caddy_data:
  caddy_config:
  # mcporter install dir + per-server config (incl. hindsight bearer entry).
  # Tear-down: `docker volume rm openclaw_openclaw_npm_global openclaw_openclaw_mcporter`
  # then reinstall via `docker exec openclaw-gateway sh -c 'npm install -g mcporter'`
  # plus the `mcporter config add hindsight ...` command from gbrain/README docs.
  openclaw_npm_global:
  openclaw_mcporter:
